[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "resona-client"
version = "0.1.0"
description = "HTTP client library for Resona API"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/resona_client"]
