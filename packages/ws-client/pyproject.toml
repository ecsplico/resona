[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ws-client"
version = "0.1.0"
description = "Client library for whisper-server API"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ws_client"]
