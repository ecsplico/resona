[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ws-engine"
version = "0.1.0"
description = "Stateless transcription engine for whisper-server"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.7",
    "uvicorn>=0.34.0",
    "numpy>=2.1.3",
    "faster-whisper>=1.1.1",
    "openai-whisper>=20240930",
    "transformers>=4.48.1",
    "ffmpeg-python>=0.2.0",
    "python-decouple>=3.8",
    "python-multipart>=0.0.20",
    "torch>=2.11.0.dev",
    "torchaudio>=2.11.0.dev",
    "triton",
    "websockets>=16.0",
]

[project.scripts]
ws-engine = "ws_engine.run:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ws_engine"]

