[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "resona-engine-faster-whisper"
version = "0.1.0"
description = "Faster-whisper (CTranslate2) backend for Resona — the default, recommended ASR engine"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "mortegro", email = "mortegro@gmx.de" },
]
requires-python = ">=3.12"
keywords = ["asr", "whisper", "faster-whisper", "ctranslate2", "transcription", "speech-to-text", "resona"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: GPU :: NVIDIA CUDA",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "resona-asr-core>=0.1.0",
    "resona-engine-server>=0.1.0",
    "faster-whisper>=1.1.1",
    # faster-whisper 1.1.1 imports `requests` but does not declare it; it used
    # to arrive via huggingface-hub <1.0, which has since moved to httpx.
    "requests>=2.31",
    "nvidia-cublas-cu12>=12.3; sys_platform == 'linux'",
    "nvidia-cudnn-cu12>=9.0,<10; sys_platform == 'linux'",
]

[project.urls]
Homepage = "https://github.com/ecsplico/resona"
Documentation = "https://ecsplico.github.io/resona/"
Repository = "https://github.com/ecsplico/resona"
Issues = "https://github.com/ecsplico/resona/issues"

[tool.uv.sources]
resona-asr-core = { workspace = true }
resona-engine-server = { workspace = true }

[project.entry-points."resona.engines"]
faster-whisper = "resona_engine_faster_whisper.transcriber:FastWhisperTranscriber"

[project.scripts]
resona-engine-faster-whisper = "resona_engine_server.run:main"

[tool.hatch.build.targets.wheel]
packages = ["src/resona_engine_faster_whisper"]
