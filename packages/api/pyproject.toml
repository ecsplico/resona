[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "resona-api"
version = "0.1.0"
description = "Job queue, database, and postprocessing API for Resona"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.7",
    "uvicorn>=0.34.0",
    "sqlmodel>=0.0.22",
    "httpx>=0.28.1",
    "aiofiles>=24.1.0",
    "python-multipart>=0.0.20",
    "python-decouple>=3.8",
    "python-dotenv>=1.1.0",
    "resona-postprocess",
]

[tool.uv.sources]
resona-postprocess = { workspace = true }

[project.scripts]
resona-api = "resona_api.run:main"

[tool.hatch.build.targets.wheel]
packages = ["src/resona_api"]
