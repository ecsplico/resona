[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "resona-postprocess"
version = "0.1.0"
description = "Postprocessing pipeline for Resona — composable steps: regex replacements, LLM transforms (litellm), and structured extraction"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "mortegro", email = "mortegro@gmx.de" },
]
requires-python = ">=3.12"
keywords = ["nlp", "llm", "litellm", "postprocessing", "transcription", "asr", "resona"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Text Processing :: Linguistic",
]
dependencies = [
    "litellm>=1.30.0",
    "python-decouple>=3.8",
]

[project.urls]
Homepage = "https://github.com/ecsplico/resona"
Documentation = "https://ecsplico.github.io/resona/"
Repository = "https://github.com/ecsplico/resona"
Issues = "https://github.com/ecsplico/resona/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/resona_postprocess"]
