[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "resona-cloud-tts"
version = "0.1.0"
description = "Cloud text-to-speech providers (OpenAI, ElevenLabs, Deepgram) for Resona"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "mortegro", email = "mortegro@gmx.de" },
]
requires-python = ">=3.12"
keywords = ["tts", "text-to-speech", "openai", "elevenlabs", "deepgram", "speech-synthesis", "resona"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.28.1",
]

[project.urls]
Homepage = "https://github.com/ecsplico/resona"
Documentation = "https://ecsplico.github.io/resona/"
Repository = "https://github.com/ecsplico/resona"
Issues = "https://github.com/ecsplico/resona/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/resona_cloud_tts"]
