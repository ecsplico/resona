[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ws-cli"
version = "0.1.0"
description = "CLI tools for whisper-server"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.15.3",
    "textual>=3.2.0",
    "sounddevice>=0.5.1",
    "soundfile>=0.13.1",
    "numpy>=2.1.3",
    "torchaudio>=2.11.0.dev",
    "python-dotenv>=1.1.0",
    "ws-client",
    "ws-engine",
]

[project.scripts]
ws-cli = "ws_cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/ws_cli"]

[tool.uv.sources]
ws-client = { workspace = true }
ws-engine = { workspace = true }
