[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "resona-asr-core"
version = "0.1.0"
description = "Lean ASR contracts for Resona — protocol, registry, audio loader, live transcriber. No FastAPI."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "mortegro", email = "mortegro@gmx.de" },
]
requires-python = ">=3.12"
keywords = ["asr", "speech-to-text", "transcription", "resona", "protocol"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=2.1.3",
    "ffmpeg-python>=0.2.0",
    "python-decouple>=3.8",
]

[project.urls]
Homepage = "https://github.com/ecsplico/resona"
Documentation = "https://ecsplico.github.io/resona/"
Repository = "https://github.com/ecsplico/resona"
Issues = "https://github.com/ecsplico/resona/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/resona_asr_core"]
