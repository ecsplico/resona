[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ws-recorder"
version = "0.1.0"
description = "Terminal audio recorder TUI"
requires-python = ">=3.12"
dependencies = [
    "sounddevice>=0.5.1",
    "soundfile>=0.13.1",
    "numpy>=2.1.3",
    "textual>=3.2.0",
]

[project.scripts]
ws-rec = "recorder.micrec:run_mic_rec_app"

[tool.hatch.build.targets.wheel]
packages = ["src/recorder"]
