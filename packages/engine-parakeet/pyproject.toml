[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "resona-engine-parakeet"
version = "0.1.0"
description = "NVIDIA Parakeet (NeMo FastConformer) backend for Resona — fast multilingual CUDA/CPU transcription"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "mortegro", email = "mortegro@gmx.de" },
]
requires-python = ">=3.12"
keywords = ["asr", "parakeet", "nemo", "fastconformer", "nvidia", "transcription", "speech-to-text", "resona"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: GPU :: NVIDIA CUDA",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "resona-asr-core>=0.1.0",
    "resona-engine-server>=0.1.0",
    # NeMo is Linux/CUDA-first; gated so a macOS `uv sync --all-packages` stays
    # green. The entry point still registers there — selecting the engine errors.
    "nemo_toolkit[asr]>=2.0.0; sys_platform == 'linux'",
]

[project.urls]
Homepage = "https://github.com/ecsplico/resona"
Documentation = "https://ecsplico.github.io/resona/"
Repository = "https://github.com/ecsplico/resona"
Issues = "https://github.com/ecsplico/resona/issues"

[tool.uv.sources]
resona-asr-core = { workspace = true }
resona-engine-server = { workspace = true }

[project.entry-points."resona.engines"]
parakeet = "resona_engine_parakeet.transcriber:ParakeetTranscriber"

[project.scripts]
resona-engine-parakeet = "resona_engine_server.run:main"

[tool.hatch.build.targets.wheel]
packages = ["src/resona_engine_parakeet"]
