site_name: whisper-server
site_description: Audio transcription system built on OpenAI Whisper / faster-whisper

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/ws-client/src
            - packages/ws-api/src
            - packages/ws-engine/src
            - apps/cli/src
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - CLI Reference: cli.md
  - Configuration:
    - Backends & SSH: configuration/backends.md
    - Environment Variables: configuration/environment.md
  - API Reference:
    - Client Library: reference/client.md
    - ws-api Internals: reference/ws-api.md
    - ws-engine Internals: reference/ws-engine.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
