site_name: Resona
site_description: Modular audio transcription platform with pluggable ASR engines

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/client/src
            - packages/api/src
            - packages/asr-core/src
            - packages/engine-server/src
            - packages/engine-faster-whisper/src
            - packages/engine-whisper/src
            - packages/engine-voxtral/src
            - packages/cloud-stt/src
            - packages/postprocess/src
            - apps/resona-cli/src
            - packages/ws-client/src
            - packages/ws-api/src
            - packages/ws-engine/src
            - apps/cli/src
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false

nav:
  - Home: index.md
  - User Guide:
    - CLI Setup & Onboarding: onboarding.md
    - Server Setup: getting-started.md
  - Architecture: architecture.md
  - CLI Reference: cli.md
  - Configuration:
    - Engines & SSH: configuration/engines.md
    - Environment Variables: configuration/environment.md
  - API Reference:
    - Client Library: reference/client.md
    - resona-api Internals: reference/ws-api.md
    - resona-engine Internals: reference/engine.md

validation:
  links:
    not_found: ignore

not_in_nav: |
  superpowers/**

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
