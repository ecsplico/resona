site_name: Resona
site_description: Modular audio transcription platform with pluggable ASR engines and composable postprocessing
site_url: https://ecsplico.github.io/resona/
repo_url: https://github.com/ecsplico/resona
repo_name: ecsplico/resona
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/client/src
            - packages/api/src
            - packages/asr-core/src
            - packages/engine-server/src
            - packages/engine-faster-whisper/src
            - packages/engine-whisper/src
            - packages/engine-voxtral/src
            - packages/cloud-stt/src
            - packages/cloud-tts/src
            - packages/postprocess/src
            - apps/resona-cli/src
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Local-Only Mode: getting-started/local-only.md
  - User Guide:
    - CLI Reference: guide/cli.md
    - Engine Selection: guide/engines.md
    - Text Replacements: guide/replacements.md
    - Postprocessing: guide/postprocessing.md
    - Speech Synthesis: guide/tts.md
    - Privacy: guide/privacy.md
  - Server Setup:
    - Docker Deployment: server/docker.md
    - Full-Stack (uv): server/full-stack.md
  - Configuration:
    - Environment Variables: configuration/environment.md
    - Config Files: configuration/config-files.md
  - Architecture:
    - Overview: architecture/overview.md
    - Stateless Engine Contract: architecture/engine-contract.md
    - Job Lifecycle: architecture/job-lifecycle.md
    - Postprocessing Pipeline: architecture/postprocessing.md
  - API Reference:
    - resona-client: reference/client.md
    - resona-api: reference/api.md
    - resona-engine-server: reference/engine-server.md
    - resona-asr-core: reference/asr-core.md
    - resona-cloud-stt: reference/cloud-stt.md
    - resona-cloud-tts: reference/cloud-tts.md
    - resona-postprocess: reference/postprocess.md
  - Development:
    - Dev Workflow: development/workflow.md
    - Adding an Engine: development/adding-engine.md
    - Testing: development/testing.md

not_in_nav: |
  superpowers/**

exclude_docs: |
  superpowers/**

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
