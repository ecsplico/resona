[project]
name = "whisper-server-workspace"
version = "0.1.0"
requires-python = ">=3.12"

[tool.uv.workspace]
members = ["packages/*", "apps/cli"]

[[tool.uv.index]]
name = "pytorch-nightly"
url = "https://download.pytorch.org/whl/nightly/cu128"
explicit = true

[tool.uv.sources]
torch = [{ index = "pytorch-nightly" }]
torchaudio = [{ index = "pytorch-nightly" }]
triton = [{ index = "pytorch-nightly" }]

[tool.uv.extra-build-dependencies]
openai-whisper = ["setuptools", "wheel"]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "respx>=0.21.1",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.25",
]
