[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
[project]
name = "whisper-server"
version = "0.1.0"
description = "A Server for transcribing german audio files"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiofiles>=24.1.0",
    "fastapi>=0.115.7",
    "faster-whisper>=1.1.1",
    "ffmpeg-python>=0.2.0",
    "openai-whisper>=20240930",
    "pypandoc>=1.15",
    "python-decouple>=3.8",
    "python-multipart>=0.0.20",
    "sqlmodel>=0.0.22",
    "torch>=2.5.1",
    "torchaudio>=2.5.1",
    "transformers>=4.48.1",
    "typer>=0.15.3",
    "uvicorn>=0.34.0",
]

[project.scripts]
ws-cli = "cli.main:app"

[tool.setuptools.packages.find]
where = ["src"]
