<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Transkription - Resona</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f5f5f5;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }

        .status-indicator.connected {
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        .status-indicator.recording {
            background: #f44336;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .transcript-container {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
        }

        .transcript-line {
            padding: 10px;
            margin-bottom: 10px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .transcript-line.final {
            border-left-color: #4caf50;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c62828;
        }

        .audio-visualizer {
            height: 60px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .visualizer-bar {
            width: 4px;
            background: linear-gradient(to top, #667eea, #764ba2);
            margin: 0 2px;
            border-radius: 2px;
            transition: height 0.1s ease;
        }
    </style>
</head>
<body>
    <div class="container" x-data="transcriptionApp()">
        <h1>🎤 Live Transkription</h1>
        <p class="subtitle">Echtzeit-Spracherkennung mit Resona</p>

        <!-- Error Display -->
        <div x-show="error" class="error" x-text="error"></div>

        <!-- Status -->
        <div class="status">
            <div class="status-indicator" :class="{ 'connected': connected, 'recording': recording }"></div>
            <span x-text="statusText"></span>
        </div>

        <!-- Audio Visualizer -->
        <div class="audio-visualizer" x-show="recording">
            <template x-for="i in 20" :key="i">
                <div class="visualizer-bar" :style="`height: ${Math.random() * 40 + 10}px`"></div>
            </template>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-start" @click="startRecording" :disabled="recording || !connected">
                <span x-show="!recording">▶ Start Aufnahme</span>
                <span x-show="recording">Läuft...</span>
            </button>
            <button class="btn-stop" @click="stopRecording" :disabled="!recording">
                ⏹ Stop
            </button>
        </div>

        <!-- Transcript Display -->
        <div class="transcript-container">
            <template x-if="transcripts.length === 0">
                <div class="empty-state">
                    <svg fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 3.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 1-.5-.5zM7.5 5a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1h-5zM7 7.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zM7.5 9a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1h-5z"/>
                    </svg>
                    <p>Klicke auf "Start Aufnahme" um zu beginnen</p>
                </div>
            </template>
            
            <template x-for="(transcript, index) in transcripts" :key="index">
                <div class="transcript-line" :class="{ 'final': transcript.isFinal }">
                    <span x-text="transcript.text"></span>
                </div>
            </template>
        </div>
    </div>

    <script>
        function transcriptionApp() {
            return {
                ws: null,
                connected: false,
                recording: false,
                transcripts: [],
                error: null,
                mediaRecorder: null,
                audioContext: null,
                statusText: 'Verbinde...',

                init() {
                    this.connectWebSocket();
                },

                connectWebSocket() {
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const wsUrl = `${protocol}//${window.location.host}/ws/transcribe`;
                    
                    this.ws = new WebSocket(wsUrl);
                    
                    this.ws.onopen = () => {
                        this.connected = true;
                        this.statusText = 'Verbunden - Bereit zur Aufnahme';
                        this.error = null;
                    };
                    
                    this.ws.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        
                        if (data.type === 'transcript') {
                            this.transcripts.push({
                                text: data.text,
                                isFinal: data.is_final
                            });
                            
                            // Auto-scroll to bottom
                            this.$nextTick(() => {
                                const container = document.querySelector('.transcript-container');
                                container.scrollTop = container.scrollHeight;
                            });
                        } else if (data.type === 'error') {
                            this.error = data.message;
                        } else if (data.type === 'stopped') {
                            this.statusText = 'Aufnahme gestoppt';
                        }
                    };
                    
                    this.ws.onerror = (error) => {
                        this.error = 'WebSocket Fehler: Verbindung fehlgeschlagen';
                        this.connected = false;
                        this.statusText = 'Verbindungsfehler';
                    };
                    
                    this.ws.onclose = () => {
                        this.connected = false;
                        this.recording = false;
                        this.statusText = 'Verbindung getrennt';
                        
                        // Auto-reconnect after 3 seconds
                        setTimeout(() => this.connectWebSocket(), 3000);
                    };
                },

                async startRecording() {
                    if (!this.connected) {
                        this.error = 'Keine WebSocket-Verbindung';
                        return;
                    }

                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ 
                            audio: {
                                channelCount: 1,
                                sampleRate: 16000,
                                echoCancellation: true,
                                noiseSuppression: true
                            } 
                        });
                        
                        this.audioContext = new AudioContext({ sampleRate: 16000 });
                        const source = this.audioContext.createMediaStreamSource(stream);
                        const processor = this.audioContext.createScriptProcessor(4096, 1, 1);
                        
                        processor.onaudioprocess = (e) => {
                            if (!this.recording) return;
                            
                            const inputData = e.inputBuffer.getChannelData(0);
                            const pcmData = new Int16Array(inputData.length);
                            
                            // Convert float32 to int16
                            for (let i = 0; i < inputData.length; i++) {
                                const s = Math.max(-1, Math.min(1, inputData[i]));
                                pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            }
                            
                            // Send to WebSocket
                            if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                                const base64Audio = btoa(String.fromCharCode(...new Uint8Array(pcmData.buffer)));
                                this.ws.send(JSON.stringify({
                                    type: 'audio',
                                    data: base64Audio,
                                    sample_rate: 16000
                                }));
                            }
                        };
                        
                        source.connect(processor);
                        processor.connect(this.audioContext.destination);
                        
                        this.recording = true;
                        this.statusText = 'Aufnahme läuft...';
                        this.error = null;
                        
                    } catch (err) {
                        this.error = 'Mikrofon-Zugriff verweigert: ' + err.message;
                    }
                },

                stopRecording() {
                    this.recording = false;
                    this.statusText = 'Verbunden - Bereit zur Aufnahme';
                    
                    if (this.audioContext) {
                        this.audioContext.close();
                        this.audioContext = null;
                    }
                    
                    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                        this.ws.send(JSON.stringify({ type: 'stop' }));
                    }
                }
            }
        }
    </script>
</body>
</html>
