name: Docker build (PR check)

# Builds every image without pushing — catches Dockerfile / dependency
# breakage on PRs before a tag actually triggers a real GHCR push.

on:
  push:
    branches: [main]
    paths:
      - 'packages/**/Dockerfile'
      - 'packages/**/pyproject.toml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'packages/**/Dockerfile'
      - 'packages/**/pyproject.toml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docker-build.yml'

jobs:
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: resona-engine-faster-whisper, dockerfile: packages/engine-faster-whisper/Dockerfile }
          - { name: resona-engine-whisper,        dockerfile: packages/engine-whisper/Dockerfile }
          - { name: resona-engine-voxtral,        dockerfile: packages/engine-voxtral/Dockerfile }
          - { name: resona-api,                   dockerfile: packages/api/Dockerfile }
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
