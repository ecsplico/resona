name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        # libportaudio2  → required by `sounddevice` (imported by test_micrec)
        # ffmpeg         → required by `resona_asr_core.audio.load_audio()`
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libportaudio2 ffmpeg

      # setup-uv dropped moving major tags in v8 — pin a specific version.
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install workspace packages
        run: uv sync --all-packages

      - name: Run tests
        run: uv run pytest
