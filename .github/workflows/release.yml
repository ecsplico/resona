name: Release

# Fires on:
#   - pushing a tag like vX.Y.Z (the normal release path)
#   - manual run from the Actions UI (workflow_dispatch) for re-runs / dry-runs
#
# What it does (in three parallel jobs):
#   pypi    — builds every publishable workspace package and publishes to PyPI
#             via OIDC trusted publishing (no API token secret needed).
#   docker  — builds each engine + api image and pushes to ghcr.io/ecsplico/.
#   release — drafts a GitHub release with auto-generated notes; depends on the
#             other two so a partial release never publishes notes.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release
  packages: write   # needed to push to ghcr.io
  id-token: write   # needed by PyPI trusted-publishing OIDC

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # PyPI publishing.
  #
  # PREREQUISITE — one-time setup per project on PyPI:
  #   https://pypi.org/manage/account/publishing/
  # Register each package name below as a "pending publisher" tied to:
  #   owner          = ecsplico
  #   repository     = resona
  #   workflow name  = Release          (must match the `name:` above)
  #   environment    = (leave blank)
  # Until this is configured, the publish step will fail with
  # "invalid-publisher" — that's the OIDC handshake refusing.
  # ──────────────────────────────────────────────────────────────────────
  pypi:
    name: Build & publish ${{ matrix.package.name }} to PyPI
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { name: resona-asr-core,              path: packages/asr-core }
          - { name: resona-engine-server,         path: packages/engine-server }
          - { name: resona-engine-faster-whisper, path: packages/engine-faster-whisper }
          - { name: resona-engine-whisper,        path: packages/engine-whisper }
          - { name: resona-engine-voxtral,        path: packages/engine-voxtral }
          - { name: resona-cloud-stt,             path: packages/cloud-stt }
          - { name: resona-cloud-tts,             path: packages/cloud-tts }
          - { name: resona-postprocess,           path: packages/postprocess }
          - { name: resona-api,                   path: packages/api }
          - { name: resona-client,                path: packages/client }
          - { name: resona-cli,                   path: apps/resona-cli }
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build sdist + wheel
        run: uv build --package ${{ matrix.package.name }} --out-dir dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.package.name }}
          path: dist/

      - name: Publish to PyPI (trusted publishing / OIDC)
        # Skips automatically if the dist/ directory contains an already-uploaded
        # version. Set skip-existing: true if you want to re-run after a partial
        # failure.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ──────────────────────────────────────────────────────────────────────
  # Docker images → GHCR.
  #
  # GHCR uses the `org.opencontainers.image.source` LABEL on each Dockerfile
  # to link the image to the source repo and inherit its permissions. That
  # label is already set in each Dockerfile.
  #
  # GPU engines are linux/amd64 only — no arm64 (CUDA wheels are amd64).
  # ──────────────────────────────────────────────────────────────────────
  docker:
    name: Build & push ${{ matrix.image.name }} to GHCR
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: resona-engine-faster-whisper, dockerfile: packages/engine-faster-whisper/Dockerfile }
          - { name: resona-engine-whisper,        dockerfile: packages/engine-whisper/Dockerfile }
          - { name: resona-engine-voxtral,        dockerfile: packages/engine-voxtral/Dockerfile }
          - { name: resona-api,                   dockerfile: packages/api/Dockerfile }
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ecsplico/${{ matrix.image.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────
  # Draft a GitHub release with auto-generated notes once both publish
  # jobs succeed.
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    needs: [pypi, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so release notes can diff against the prior tag

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
