services:
  engine-faster-whisper:
    profiles: ["faster-whisper"]
    build:
      context: .
      dockerfile: packages/engine-faster-whisper/Dockerfile
    ports:
      - "7720:7001"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      RESONA_ENGINE: faster-whisper
      DEFAULT_FASTWHISPER_MODEL: large-v3
      LOGLEVEL: info
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3.12", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  engine-whisper:
    profiles: ["whisper"]
    build:
      context: .
      dockerfile: packages/engine-whisper/Dockerfile
    ports:
      - "7722:7001"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      RESONA_ENGINE: whisper
      DEFAULT_WHISPER_MODEL: large-v3
      LOGLEVEL: info
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3.12", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  engine-voxtral:
    profiles: ["voxtral"]
    build:
      context: .
      dockerfile: packages/engine-voxtral/Dockerfile
    ports:
      - "7723:7001"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      RESONA_ENGINE: voxtral
      DEFAULT_VOXTRAL_MODEL: openai/whisper-large-v3
      LOGLEVEL: info
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3.12", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  engine-parakeet:
    profiles: ["parakeet"]
    build:
      context: .
      dockerfile: packages/engine-parakeet/Dockerfile
    ports:
      - "7721:7001"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      RESONA_ENGINE: parakeet
      DEFAULT_PARAKEET_MODEL: nvidia/parakeet-tdt-0.6b-v3
      LOGLEVEL: info
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3.12", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "7710:7000"
    volumes:
      # Split per-purpose named volumes — matches the subdirs created by
      # packages/api/src/resona_api/paths.py. Migration from a previous
      # `./data:/app/data` bind mount: copy ./data/{files,md,db,profiles}
      # into the corresponding named volume before first start.
      - resona-audio:/app/data/files
      - resona-md:/app/data/md
      - resona-db:/app/data/db
      - resona-profiles:/app/data/profiles
    environment:
      RESONA_ENGINE_URLS: http://engine-faster-whisper:7001,http://engine-whisper:7001,http://engine-voxtral:7001,http://engine-parakeet:7001
      DATA_PATH: /app/data
      LOGLEVEL: info
    env_file:
      - .env
    depends_on:
      engine-faster-whisper:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python3.12", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  directus:
    image: directus/directus:11
    ports:
      - "7700:8055"
    volumes:
      - directus-db:/directus/database
      - directus-uploads:/directus/uploads
      - ./directus/schema-snapshot.yaml:/directus/schema-snapshot.yaml:ro
    environment:
      SECRET: ${DIRECTUS_SECRET:-change-me-in-env}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-change-me}
      DB_CLIENT: sqlite3
      DB_FILENAME: /directus/database/data.db
      WEBSOCKETS_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8055/server/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  directus-transcribe:
    build:
      context: .
      dockerfile: packages/directus-transcribe/Dockerfile
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN}
      RESONA_API_URL: http://api:7000
      RESONA_API_KEY: ${RESONA_API_KEY:-}
      TRANSCRIBE_POLL_INTERVAL: "5"
      TRANSCRIBE_CONCURRENCY: "2"
      LOGLEVEL: info
    depends_on:
      directus:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  resona-audio:
  resona-md:
  resona-db:
  resona-profiles:
  directus-db:
  directus-uploads:
